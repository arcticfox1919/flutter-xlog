name: 'XLogBindings'
description: 'Bindings for xlog library'
output: 'lib/src/generated/xlog_bindings.dart'

llvm-path:
  - 'D:\develop2\LLVM'

headers:
  entry-points:
    - 'tool/xloggerbase.h'
  # Only generate declarations that come from our own header, not the system
  # headers (MSVC CRT, stdint, time) that get pulled in transitively.
  include-directives:
    - 'tool/xloggerbase.h'

# Restrict generated symbols to the xlogger API surface, dropping the CRT
# macros/types that the transitive system includes would otherwise emit.
functions:
  include:
    - 'xlogger_.*'
structs:
  include:
    - 'XLoggerInfo.*'
enums:
  include:
    - 'TLogLevel'
typedefs:
  include:
    - 'xlogger_.*'

# TLogLevel's underlying integer type is implementation-defined; ffigen mimics
# the common compiler choice per OS/arch. Silence the resulting warning.
silence-enum-warning: true

# clang parses the C headers on the host (Windows) to extract API signatures.
# POSIX <sys/time.h> does not exist on Windows, so point clang at a local shim
# that supplies struct timeval. Parsing-only; the bindings stay cross-platform.
compiler-opts:
  - '-Itool/shim'

preamble: |
  // Copyright (c) 2025, xlog project.
  // All rights reserved.
  
  // ignore_for_file: always_specify_types
  // ignore_for_file: camel_case_types
  // ignore_for_file: non_constant_identifier_names
  // ignore_for_file: unused_element

comments:
  style: any
  length: full